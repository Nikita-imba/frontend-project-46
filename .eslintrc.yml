env:
  node: true
  jest: true
  es2021: true
extends: airbnb-base
parserOptions:
  ecmaVersion: latest
  sourceType: module
rules:
  no-console: 'off'
  import/extensions: 'off'
  no-underscore-dangle: 'off'
  linebreak-style: 'off'
  semi: [error, never]
  arrow-parens: [error, as-needed]
  comma-dangle: [error, always-multiline]
  eol-last: [error, always]